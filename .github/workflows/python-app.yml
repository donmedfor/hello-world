name: Docker Build & Trivy Scan

on:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  packages: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t hello-flask:${{ github.sha }} .

      - name: Tag image for GHCR
        run: |
          docker tag hello-flask:${{ github.sha }} ghcr.io/${{ github.repository }}:latest
          docker tag hello-flask:${{ github.sha }} ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Push image to GHCR
        run: |
          docker push ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan image
        run: |
          trivy image \
            --format table \
            --output trivy-report.txt \
            hello-flask:${{ github.sha }}

      - name: Generate SARIF
        run: |
          trivy image \
            --format sarif \
            --output trivy-report.sarif \
            hello-flask:${{ github.sha }}

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-report.txt
            trivy-report.sarif
